name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: verify generic release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Run release gate
        run: bash scripts/release-check.sh

  smoke:
    name: smoke product flows
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check customer UX capabilities
        id: customer_ux_capabilities
        shell: bash
        run: |
          set -euo pipefail
          can_run_customer_ux=0

          if [[ ! -f scripts/customer-ux-check.sh ]]; then
            echo "customer_ux_available=0" >> "${GITHUB_OUTPUT}"
            echo "customer_ux_reason=customer UX suite is missing in this checkout" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "customer_ux_available=0" >> "${GITHUB_OUTPUT}"
            echo "customer_ux_reason=Docker CLI is unavailable on this runner" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! docker info >/dev/null 2>&1; then
            echo "customer_ux_available=0" >> "${GITHUB_OUTPUT}"
            echo "customer_ux_reason=Docker daemon is unavailable on this runner" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! command -v python3 >/dev/null 2>&1; then
            echo "customer_ux_available=0" >> "${GITHUB_OUTPUT}"
            echo "customer_ux_reason=python3 is unavailable for the loopback bind preflight" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! python3 -c 'import socket; sock = socket.socket(); sock.bind(("127.0.0.1", 0)); sock.close()' >/dev/null 2>&1; then
            echo "customer_ux_available=0" >> "${GITHUB_OUTPUT}"
            echo "customer_ux_reason=this runner cannot bind 127.0.0.1 for the dataset analyze preflight" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          can_run_customer_ux=1
          echo "customer_ux_available=${can_run_customer_ux}" >> "${GITHUB_OUTPUT}"
          echo "customer_ux_reason=runner prerequisites satisfied" >> "${GITHUB_OUTPUT}"

      - name: Customer UX suite or smoke fallback
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.customer_ux_capabilities.outputs.customer_ux_available }}" == "1" ]]; then
            bash scripts/customer-ux-check.sh
          else
            echo "customer-ux suite unavailable: ${{ steps.customer_ux_capabilities.outputs.customer_ux_reason }}"
            echo "running smoke fallback instead"
            bash scripts/dashboard-smoke.sh --check
            bash scripts/dataset-smoke.sh
          fi

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --bin ebpf-tracker --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}"
          archive_name="${package_dir}.tar.gz"
          mkdir -p "${package_dir}"
          cp "target/${{ matrix.target }}/release/ebpf-tracker" "${package_dir}/"
          cp LICENSE "${package_dir}/" 2>/dev/null || true
          cp README.md "${package_dir}/" 2>/dev/null || true
          tar -czf "${archive_name}" -C dist "ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() && needs.build.result != 'failure' }}
    permissions:
      contents: write

    steps:
      - name: Download build archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/ebpf-tracker-*.tar.gz
          generate_release_notes: true

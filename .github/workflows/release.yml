name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: verify generic release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Run release gate
        run: bash scripts/release-check.sh

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --bin ebpf-tracker --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}"
          archive_name="${package_dir}.tar.gz"
          mkdir -p "${package_dir}"
          cp "target/${{ matrix.target }}/release/ebpf-tracker" "${package_dir}/"
          cp LICENSE "${package_dir}/" 2>/dev/null || true
          cp README.md "${package_dir}/" 2>/dev/null || true
          tar -czf "${archive_name}" -C dist "ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/ebpf-tracker-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/ebpf-tracker-*.tar.gz
          generate_release_notes: true
